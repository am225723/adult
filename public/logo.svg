<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Dark teal circle background -->
  <circle cx="60" cy="60" r="58" fill="#1C3D3A"/>
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)" opacity="0.3"/>

  <!-- Stars/dots -->
  <circle cx="30" cy="22" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="90" cy="18" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="20" cy="38" r="1" fill="white" opacity="0.5"/>
  <circle cx="100" cy="35" r="1" fill="white" opacity="0.5"/>
  <circle cx="60" cy="12" r="1.5" fill="white" opacity="0.6"/>

  <!-- Green wavy ground at bottom -->
  <path d="M 10 82 Q 30 72 50 78 Q 70 84 90 74 Q 105 67 115 72 L 115 108 Q 90 100 60 106 Q 30 112 10 105 Z" fill="#4A9B6E" opacity="0.85"/>
  <path d="M 5 88 Q 25 80 48 86 Q 68 92 88 82 Q 108 73 118 80 L 118 115 Q 90 108 60 114 Q 28 120 5 113 Z" fill="#3A8A5C" opacity="0.7"/>

  <!-- Road/path up the center -->
  <path d="M 58 108 L 56 78" stroke="#2a5a44" stroke-width="2.5" stroke-dasharray="3,3" opacity="0.6"/>
  <path d="M 62 108 L 64 78" stroke="#2a5a44" stroke-width="2.5" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- Brain stem / trunk -->
  <path d="M 57 76 L 57 65 Q 57 62 60 62 Q 63 62 63 65 L 63 76" fill="white" stroke="white" stroke-width="0.5"/>

  <!-- Left brain hemisphere -->
  <path d="
    M 60 62
    Q 60 58 57 55
    Q 52 50 48 52
    Q 44 54 43 58
    Q 41 62 43 66
    Q 42 70 45 72
    Q 48 74 51 73
    Q 54 75 57 76
    L 60 62
  " fill="white" stroke="#1C3D3A" stroke-width="0.8"/>

  <!-- Left brain sulci -->
  <path d="M 48 58 Q 50 60 48 63" stroke="#4A9B6E" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M 44 62 Q 47 64 46 67" stroke="#4A9B6E" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M 51 54 Q 53 57 51 60" stroke="#4A9B6E" stroke-width="1" stroke-linecap="round" fill="none"/>

  <!-- Right brain hemisphere -->
  <path d="
    M 60 62
    Q 60 58 63 55
    Q 68 50 72 52
    Q 76 54 77 58
    Q 79 62 77 66
    Q 78 70 75 72
    Q 72 74 69 73
    Q 66 75 63 76
    L 60 62
  " fill="white" stroke="#1C3D3A" stroke-width="0.8"/>

  <!-- Right brain sulci -->
  <path d="M 72 58 Q 70 60 72 63" stroke="#4A9B6E" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M 76 62 Q 73 64 74 67" stroke="#4A9B6E" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M 69 54 Q 67 57 69 60" stroke="#4A9B6E" stroke-width="1" stroke-linecap="round" fill="none"/>

  <!-- Central dividing line -->
  <path d="M 60 62 L 60 52" stroke="#4A9B6E" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Left branch/foliage -->
  <circle cx="47" cy="48" r="5" fill="#5BAE78" opacity="0.9"/>
  <circle cx="43" cy="54" r="4" fill="#4A9B6E" opacity="0.8"/>
  <circle cx="51" cy="44" r="4" fill="#6BC285" opacity="0.85"/>

  <!-- Right branch/foliage -->
  <circle cx="73" cy="48" r="5" fill="#5BAE78" opacity="0.9"/>
  <circle cx="77" cy="54" r="4" fill="#4A9B6E" opacity="0.8"/>
  <circle cx="69" cy="44" r="4" fill="#6BC285" opacity="0.85"/>

  <!-- Top foliage -->
  <circle cx="60" cy="40" r="5.5" fill="#6BC285" opacity="0.9"/>
  <circle cx="55" cy="43" r="4" fill="#5BAE78" opacity="0.8"/>
  <circle cx="65" cy="43" r="4" fill="#5BAE78" opacity="0.8"/>

  <!-- Outer ring accent -->
  <circle cx="60" cy="60" r="56" stroke="#4A9B6E" stroke-width="1.5" fill="none" opacity="0.4"/>

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2a5a50"/>
      <stop offset="100%" stop-color="#0d2420"/>
    </radialGradient>
  </defs>
</svg>
